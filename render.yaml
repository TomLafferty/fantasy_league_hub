services:
  - type: web
    name: fantasy-league-hub
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-league-hub-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.9"

databases:
  - name: fantasy-league-hub-db
    plan: free
