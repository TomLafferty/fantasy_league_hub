<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fantasy League Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">Fantasy League Hub</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/champions/">Champions</a>
      <a class="nav-link" href="/standings/">Standings</a>
      <a class="nav-link" href="/keepers/history/">Keeper History</a>
      <a class="nav-link" href="/keepers/submit/">Submit Keepers</a>
      {% if user.is_authenticated %}
        <a class="nav-link" href="/logout/">Logout</a>
      {% else %}
        <a class="nav-link" href="/login/">Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
