{% extends "leaguehub/base.html" %}
{% block content %}
<h1>Keeper History</h1>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Season</th>
      <th>Team</th>
      <th>Player</th>
      <th>Source</th>
    </tr>
  </thead>
  <tbody>
    {% for r in records %}
      <tr>
        <td>{{ r.season.year }}</td>
        <td>{{ r.team.name }}</td>
        <td>{{ r.player.full_name }}</td>
        <td>{{ r.get_source_display }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No keeper history entered.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
