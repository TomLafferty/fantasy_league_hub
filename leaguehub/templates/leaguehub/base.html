<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ league_name }} Hub{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      {% if league_logo_url %}<img src="{{ league_logo_url }}" alt="" height="32" style="border-radius:4px">{% endif %}
      {{ league_name }} Hub
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <div class="navbar-nav ms-auto">
        <a class="nav-link {% block nav_champions %}{% endblock %}" href="/champions/">Champions</a>
        <a class="nav-link {% block nav_standings %}{% endblock %}" href="/standings/">Standings</a>
        <a class="nav-link {% block nav_history %}{% endblock %}" href="/keepers/history/">Keeper History</a>
        <a class="nav-link {% block nav_submit %}{% endblock %}" href="/keepers/submit/">Submit Keepers</a>
        {% if user.is_authenticated %}
          <a class="nav-link" href="/logout/">Logout</a>
        {% else %}
          <a class="nav-link" href="/login/">Login</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<div class="container">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
