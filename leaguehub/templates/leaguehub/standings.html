{% extends "leaguehub/base.html" %}
{% block content %}
<h1>Standings</h1>

<form method="get" class="mb-3">
  <select name="season" class="form-select" onchange="this.form.submit()">
    {% for s in seasons %}
      <option value="{{ s.id }}" {% if s.id == selected_season.id %}selected{% endif %}>{{ s.year }}</option>
    {% endfor %}
  </select>
</form>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Team</th>
      <th>Record</th>
      <th>PF</th>
    </tr>
  </thead>
  <tbody>
    {% for row in standings %}
      <tr>
        <td>{{ row.rank }}</td>
        <td>{{ row.team.name }}</td>
        <td>{{ row.wins }}-{{ row.losses }}-{{ row.ties }}</td>
        <td>{{ row.points_for }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No standings for this season yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
